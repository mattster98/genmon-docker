name: Check Upstream genmon Updates

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      update-available: ${{ steps.check.outputs.update-available }}
      latest-version: ${{ steps.check.outputs.latest-version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new genmon releases
        id: check
        run: |
          # Get the latest release from jgyates/genmon
          LATEST=$(curl -s https://api.github.com/repos/jgyates/genmon/releases/latest | jq -r '.tag_name')
          
          echo "Latest genmon version: $LATEST"
          echo "latest-version=$LATEST" >> $GITHUB_OUTPUT
          
          # Check if .genmon-version file exists and compare
          if [ -f ".genmon-version" ]; then
            CURRENT=$(cat .genmon-version)
            echo "Current tracked version: $CURRENT"
            
            if [ "$LATEST" != "$CURRENT" ]; then
              echo "New version available!"
              echo "update-available=true" >> $GITHUB_OUTPUT
            else
              echo "Already on latest version"
              echo "update-available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No version file found, treating as update available"
            echo "update-available=true" >> $GITHUB_OUTPUT
          fi

  rebuild-docker:
    needs: check-updates
    if: needs.check-updates.outputs.update-available == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Update version file
        run: |
          echo "${{ needs.check-updates.outputs.latest-version }}" > .genmon-version
          cat .genmon-version

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin docker.io
          docker build . --file docker/Dockerfile --tag docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:latest --tag docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:${{ needs.check-updates.outputs.latest-version }}
          docker push docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:latest
          docker push docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:${{ needs.check-updates.outputs.latest-version }}

      - name: Commit and push version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .genmon-version
          git commit -m "Update genmon to ${{ needs.check-updates.outputs.latest-version }}" || echo "No changes to commit"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: docker-${{ needs.check-updates.outputs.latest-version }}
          release_name: Docker Image - genmon ${{ needs.check-updates.outputs.latest-version }}
          body: |
            Automated Docker image build for genmon ${{ needs.check-updates.outputs.latest-version }}
            
            Docker image tags:
            - `docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:latest`
            - `docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPOSITORY }}:${{ needs.check-updates.outputs.latest-version }}`
          draft: false
          prerelease: false
